---
- name: Create postgres_exporter user in PostgreSQL
  become_user: postgres
  ansible.builtin.command: >
    psql -c "
      DO $$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'exporter') THEN
          CREATE ROLE exporter WITH LOGIN PASSWORD 'exporter_monitor';
          GRANT pg_monitor TO exporter;
        END IF;
      END
      $$;
    "
  changed_when: true

- name: Download postgres_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus-community/postgres_exporter/releases/download/v0.15.0/postgres_exporter-0.15.0.linux-amd64.tar.gz"
    dest: /tmp/postgres_exporter.tar.gz
    mode: "0644"

- name: Extract postgres_exporter
  ansible.builtin.unarchive:
    src: /tmp/postgres_exporter.tar.gz
    dest: /tmp/
    remote_src: true

- name: Install postgres_exporter binary
  ansible.builtin.copy:
    src: /tmp/postgres_exporter-0.15.0.linux-amd64/postgres_exporter
    dest: /usr/local/bin/postgres_exporter
    mode: "0755"
    remote_src: true

- name: Create postgres_exporter systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Prometheus PostgreSQL Exporter
      After=postgresql.service

      [Service]
      User=postgres
      Environment="DATA_SOURCE_NAME=postgresql://exporter:exporter_monitor@localhost:5432/postgres?sslmode=disable"
      ExecStart=/usr/local/bin/postgres_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/postgres_exporter.service
    mode: "0644"

- name: Enable and start postgres_exporter
  ansible.builtin.systemd:
    name: postgres_exporter
    enabled: true
    state: started
    daemon_reload: true
