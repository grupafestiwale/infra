---
- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/traefik
    - /etc/traefik/dynamic
    - /var/log/traefik

- name: Download Traefik binary
  ansible.builtin.get_url:
    url: "https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}.0/traefik_v{{ traefik_version }}.0_linux_amd64.tar.gz"
    dest: /tmp/traefik.tar.gz
    mode: "0644"

- name: Extract Traefik
  ansible.builtin.unarchive:
    src: /tmp/traefik.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    extra_opts: [traefik]

- name: Set Traefik binary permissions
  ansible.builtin.file:
    path: /usr/local/bin/traefik
    mode: "0755"

- name: Allow Traefik to bind low ports
  ansible.builtin.command: setcap 'cap_net_bind_service=+ep' /usr/local/bin/traefik
  changed_when: true

- name: Create Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: /etc/traefik/traefik.yml
    mode: "0644"
  notify: restart traefik

- name: Create Traefik dynamic config for services
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: /etc/traefik/dynamic/services.yml
    mode: "0644"
  notify: restart traefik

- name: Create Traefik systemd service
  ansible.builtin.template:
    src: traefik.service.j2
    dest: /etc/systemd/system/traefik.service
    mode: "0644"
  notify: restart traefik

- name: Create Traefik user
  ansible.builtin.user:
    name: traefik
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Enable and start Traefik
  ansible.builtin.systemd:
    name: traefik
    enabled: true
    state: started
    daemon_reload: true
